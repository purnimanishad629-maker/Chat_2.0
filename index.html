<!DOCTYPE html>
<html>
<head>

  <style>

      background: linear-gradient(to right, #667eea, #764ba2);

    h1 {
      margin-top: 30px;
      font-size: 40px;

    }

    .box {

      padding: 20px;
      margin: 20px;

      animation: fadeIn 2s ease-in-out;
    }

    img {
      width: 150px;
      border-radius: 50%;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      background: #ff4b2b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #ff416c;
    }

    a {
      text-decoration: none;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

</head>
